<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lisa &amp; Christ</title>
  <meta name="description" content="Invitation au mariage">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      color: #2d2926;
      background: #faf7f2;
      -webkit-font-smoothing: antialiased;
    }
    .frame {
      text-align: center;
      max-width: 520px;
    }
    .label {
      font-size: 10px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #8a827a;
      margin-bottom: 28px;
    }
    .line {
      width: 64px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #c5a47e, transparent);
      margin: 0 auto 28px;
    }
    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(40px, 10vw, 64px);
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .amp {
      display: block;
      font-style: italic;
      font-size: 0.45em;
      color: #c5a47e;
      margin: 8px 0;
    }
    .date {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #8a827a;
      margin-top: 32px;
    }
    footer {
      margin-top: 48px;
      font-size: 11px;
      color: #b5aea6;
    }
  </style>
</head>
<body>
  <main class="frame">
    <p class="label">Invitation au mariage</p>
    <div class="line" aria-hidden="true"></div>
    <h1>Lisa<span class="amp">&amp;</span>Christ</h1>
    <p class="date">Bientôt</p>
    <footer>Site simple — invitation</footer>
  </main>
</body>
</html>
